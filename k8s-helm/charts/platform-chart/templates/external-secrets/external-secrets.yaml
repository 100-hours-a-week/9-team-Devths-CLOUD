{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.secrets }}
{{- range $secret := .Values.externalSecrets.secrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "externalSecrets.secrets[].name is required" $secret.name }}
  namespace: {{ required "externalSecrets.secrets[].namespace is required" $secret.namespace }}
  {{- with $secret.labels }}
  labels:
{{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with $secret.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:{{ toYaml (required "externalSecrets.secrets[].spec is required" $secret.spec) | nindent 2 }}
{{- end }}
{{- end }}
