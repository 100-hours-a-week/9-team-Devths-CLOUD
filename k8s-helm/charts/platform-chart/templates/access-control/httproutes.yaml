{{- if .Values.accessControl.enabled }}
{{- range .Values.accessControl.blockedPaths }}
---
# HTTPRoute for blocking {{ .name }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: block-{{ .name }}
  namespace: {{ $.Values.gateway.namespace }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}

  # 호스트 이름 (여러 호스트에 적용 가능)
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}

  # 차단할 경로 규칙
  rules:
    {{- range .paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . }}
      backendRefs:
        - name: access-denied
          port: 80
    {{- end }}
{{- end }}
{{- end }}
