# 민감하지않은 공통 부분만 출력

# CertManager
certManager:
  enabled: false
  acmeEmail: "example@mail.com"
  letsencrypt:
    staging:
      enabled: false
    production:
      enabled: false

# 게이트웨이
gateway:
  enabled: false
  name: devths-gateway
  namespace: nginx-gateway
  gatewayClassName: nginx
  http:
    enabled: true
    port: 80
  listeners:
    dev:
      enabled: true
      domains:
        web: dev.your-domain.com      # 🔒 실제 도메인으로 변경
        api: dev.api.your-domain.com  # 🔒 실제 도메인으로 변경
        ai: dev.ai.your-domain.com    # 🔒 실제 도메인으로 변경
      tlsSecretName: your-tls-dev

    stg:
      enabled: true
      domains:
        web: stg.your-domain.com      # 🔒 실제 도메인으로 변경
        api: stg.api.your-domain.com  # 🔒 실제 도메인으로 변경
        ai: stg.ai.your-domain.com    # 🔒 실제 도메인으로 변경
      tlsSecretName: your-tls-stg

    argo:
      enabled: true
      domain: nonprod.argo.your-domain.com  # 🔒 실제 도메인으로 변경
      tlsSecretName: your-tls-argo

# 네트워크 정책
networkPolicy:
  enabled: false
  database:
    rds:
      cidr: ""
    ec2:
      ip: ""
  ports:
    frontend: 3000
    backend: 8080
    ai: 8000
    postgres: 5432
    redis: 6379
    rabbitmq: 5672
    dns: 53
    http: 80
    https: 443
  namespaces: []

# 인증서
certificates:
  enabled: false
  issuer: letsencrypt-prod
  certs: []

# External Secrets Operator 리소스
# ESO 컨트롤러/CRD는 이 차트가 아니라 별도 release로 설치해야 함
externalSecrets:
  enabled: false

  # SecretStore / ClusterSecretStore 리소스 목록
  secretStores: []

  # ExternalSecret 리소스 목록
  secrets: []

# ArgoCD 설정
argocd:
  # ArgoCD Image Updater ECR 토큰 자동 갱신
  imageUpdater:
    restartCronJob:
      enabled: false
      # ECR 토큰은 12시간마다 만료되므로 6시간마다 재시작
      # 0 */6 * * * = 매 6시간마다 (0시, 6시, 12시, 18시)
      schedule: "0 */6 * * *"
