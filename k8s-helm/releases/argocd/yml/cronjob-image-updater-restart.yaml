apiVersion: batch/v1
kind: CronJob

# 기본 정보
metadata:
  name: argocd-image-updater-restart
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-restart
    app.kubernetes.io/component: cronjob

# 스펙
spec:
  # ECR 토큰은 12시간마다 만료되므로 6시간마다 재시작
  schedule: "0 */6 * * *"

  # 이전 작업이 아직 실행 중이면 새 작업을 건너뜀
  concurrencyPolicy: Forbid

  # 성공한 작업 3개, 실패한 작업 1개 유지
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      # Job이 완료되지 않으면 10분 후 타임아웃
      activeDeadlineSeconds: 600

      # 실패 시 재시도하지 않음 (다음 스케줄에서 실행)
      backoffLimit: 0

      template:
        metadata:
          labels:
            app.kubernetes.io/name: argocd-image-updater-restart
            app.kubernetes.io/component: cronjob
        spec:
          serviceAccountName: argocd-image-updater-restart
          restartPolicy: Never

          containers:
          - name: kubectl
            image: bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent

            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Rolling out restart for argocd-image-updater-controller deployment..."
              kubectl rollout restart deployment/argocd-image-updater-controller -n argocd
              echo "Waiting for rollout to complete..."
              kubectl rollout status deployment/argocd-image-updater-controller -n argocd --timeout=5m
              echo "Restart completed successfully"

            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop:
                - ALL
---

# 서비스 계정
apiVersion: v1
kind: ServiceAccount

# 기본 정보
metadata:
  name: argocd-image-updater-restart
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-restart
    app.kubernetes.io/component: cronjob

---

# 역할
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

# 기본정보
metadata:
  name: argocd-image-updater-restart
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-restart
    app.kubernetes.io/component: cronjob

# 규칙
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["argocd-image-updater-controller"]
  verbs: ["get", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  resourceNames: ["argocd-image-updater-controller"]
  verbs: ["get"]
---

# ㄱ규칙 매핑
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

# 기본 정보
metadata:
  name: argocd-image-updater-restart
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-restart
    app.kubernetes.io/component: cronjob

# 참조 규칙
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater-restart

# 계정
subjects:
- kind: ServiceAccount
  name: argocd-image-updater-restart
  namespace: argocd
