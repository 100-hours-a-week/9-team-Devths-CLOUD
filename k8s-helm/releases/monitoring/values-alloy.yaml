# Grafana Alloy Helm values (nonprod K8s)
# Chart: grafana/alloy
# 역할: K8s Pod 로그 수집 → Loki, OTLP 트레이스 수신 → Tempo

alloy:
  # OTLP 수신 포트 노출 (4317: gRPC, 4318: HTTP)
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  mounts:
    varlog: true          # /var/log hostPath 마운트 (chart 공식 지원)
    dockercontainers: false

  configMap:
    create: true
    # River DSL 설정
    content: |
      // =========================================================
      // 로그 수집: K8s Pod → Loki
      // =========================================================

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Pod 로그 파일 tail
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // 로그 수집 제외할 Pod 선택적 필터링
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_logging_scrape"]
          regex         = "false"
          action        = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }

        rule {
          target_label = "cluster"
          replacement  = "devths-nonprod"
        }
      }

      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
        sync_period  = "5s"
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        // [1] containerd(CRI) 로그 포맷 파싱
        //   containerd 원시 로그: "2024-01-01T00:00:00Z stdout F <실제 내용>"
        //   stage.cri가 타임스탬프/스트림/플래그 헤더를 제거하고 실제 내용만 남김
        //   이 단계 없으면 이후 stage.json이 전체 CRI 행을 JSON으로 파싱하려다 실패
        stage.cri {}

        // [2] JSON 로그 파싱 (Spring Boot logback-json, FastAPI JSON logger 등)
        //   파싱 실패(비JSON 로그)해도 drop하지 않고 원본 유지 (기본 동작)
        stage.json {
          expressions = {
            level   = "level",
            traceId = "traceId",
            spanId  = "spanId",
          }
        }

        // [3] 비JSON 로그 레벨 추출 (AI plaintext 포맷, uvicorn 로그 등)
        //   JSON 파싱으로 level이 추출된 경우 덮어쓰지 않도록 빈 값일 때만 동작
        //   패턴: "2024-01-01 INFO app | message" 또는 "[INFO] message" 등
        stage.regex {
          expression = "(?i).*?(?P<level>INFO|ERROR|WARN|WARNING|DEBUG|CRITICAL).*"
        }

        // [4] 추출된 값을 Loki 라벨로 승격
        stage.labels {
          values = {
            level = "level",
          }
        }

        forward_to = [loki.write.loki.receiver]
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // =========================================================
      // OTLP 트레이스 수신: 앱 → Alloy → Tempo
      // =========================================================

      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

controller:
  type: daemonset  # 모든 노드에서 로그 수집

  # 마스터 노드 포함 실행
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule


# OTLP 수신 포트 노출
service:
  enabled: true
  type: ClusterIP
