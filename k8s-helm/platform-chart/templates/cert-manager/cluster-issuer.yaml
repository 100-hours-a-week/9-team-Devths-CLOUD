{{- if .Values.certManager.enabled }}
{{- if .Values.certManager.letsencrypt.staging.enabled }}
---
# Let's Encrypt Staging (테스트용 - rate limit 없음, 먼저 이걸로 검증)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: {{ .Values.gateway.namespace }}
                kind: Gateway
{{- end }}
{{- if .Values.certManager.letsencrypt.production.enabled }}
---
# Let's Encrypt Production (실제 인증서)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: {{ .Values.gateway.namespace }}
                kind: Gateway
{{- end }}
{{- end }}
