apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-gateway
  namespace: nginx-gateway
---
# =========================================
# Nginx Gateway Fabric Service
# AWS NLB → NodePort → Gateway Pod 구조
# =========================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway-svc
  namespace: nginx-gateway
spec:
  # kubeadm 환경에서는 NLB와 연결하기 위해 NodePort 사용
  type: NodePort

  # Gateway Controller Pod 선택
  selector:
    app.kubernetes.io/name: nginx-gateway-fabric

  ports:
    # HTTP 트래픽
    - name: http
      port: 80                # 클러스터 내부 서비스 포트
      targetPort: 80          # 컨테이너 포트
      nodePort: 30080         # NLB Target Group이 바라볼 NodePort

    # HTTPS 트래픽
    - name: https
      port: 443               # 클러스터 내부 서비스 포트
      targetPort: 443         # 컨테이너 포트
      nodePort: 30443         # NLB Target Group이 바라볼 NodePort


---
# =========================================
# Nginx Gateway Fabric Controller Deployment
# Gateway API 리소스를 watch하고
# 실제 Nginx 설정을 생성하는 컨트롤러
# =========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway-fabric
  namespace: nginx-gateway

spec:
  # Gateway Controller는 HA 구성을 위해 최소 2개 권장
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-gateway-fabric

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-gateway-fabric

    spec:
      # Gateway API 리소스를 watch하기 위한 RBAC 권한 사용
      serviceAccountName: nginx-gateway

      containers:
        - name: nginx-gateway-fabric

          image: ghcr.io/nginxinc/nginx-gateway-fabric/nginx:1.5.1

          ports:
            - containerPort: 80
            - containerPort: 443