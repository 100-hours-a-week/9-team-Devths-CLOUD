---
# stg-app HTTPRoute (stg.devths.com)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-stg
  namespace: stg-app
spec:
  parentRefs:
    - name: devths-gateway
      namespace: nginx-gateway
  hostnames:
    - "stg.devths.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-stg-service
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-stg
  namespace: stg-app
spec:
  parentRefs:
    - name: devths-gateway
      namespace: nginx-gateway
  hostnames:
    - "stg.api.devths.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend-stg-service
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-stg
  namespace: stg-app
spec:
  parentRefs:
    - name: devths-gateway
      namespace: nginx-gateway
  hostnames:
    - "stg.ai.devths.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ai-stg-service
          port: 80
