apiVersion: apps/v1
kind: Deployment

metadata:
  name: devths-ai-worker-extract

spec:
  replicas: 0

  template:
    metadata:
      labels:
        environment: stg

    spec:
      containers:
        - name: devths-ai-worker-extract

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"

          env:
            - name: OTEL_SERVICE_NAME
              value: "devths-ai-worker-extract"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=stg,service.namespace=devths,service.component=celery-worker,celery.queue=text_extract|masking|evaluation"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: ANONYMIZED_TELEMETRY
              value: "false"
