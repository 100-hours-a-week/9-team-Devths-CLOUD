apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 네임 스페이스
namespace: stg-app

resources:
  - ../../../base/ai
  - httproute.yaml

nameSuffix: -stg

# 이미지 수정
# ArgoCD Image Updater가 자동으로 newTag를 업데이트
images:
  - name: REPLACE_ME
    newName: 174678835309.dkr.ecr.ap-northeast-2.amazonaws.com/devths/ai-stg
    newTag: latest

# overlays 수정내용 반영
patches:
  - path: deployment.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: devths-ai
  - path: celery-worker-trend.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: devths-ai-worker-trend
  - path: celery-worker-extract.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: devths-ai-worker-extract
  - path: celery-beat.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: devths-ai-beat
