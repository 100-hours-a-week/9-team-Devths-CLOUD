apiVersion: apps/v1
kind: Deployment

# 기본 정보
metadata:
  name: devths-ai

# 스펙
spec:
  # Replica 개수
  replicas: 0

  # 라벨
  template:
    metadata:
      labels:
        environment: stg

    # 컨테이너 스펙
    spec:
      containers:
        - name: devths-ai

          # 자원 설정
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # OpenTelemetry 설정 (Alloy로 트레이스 전송)
          env:
            - name: OTEL_SERVICE_NAME
              value: "devths-ai"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=stg,service.namespace=devths,service.component=api"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: ANONYMIZED_TELEMETRY
              value: "false"
