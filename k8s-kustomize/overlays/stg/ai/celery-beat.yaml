apiVersion: apps/v1
kind: Deployment

metadata:
  name: devths-ai-beat

spec:
  replicas: 0

  template:
    metadata:
      labels:
        environment: stg

    spec:
      containers:
        - name: devths-ai-beat

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          env:
            - name: OTEL_SERVICE_NAME
              value: "devths-ai-beat"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=stg,service.namespace=devths,service.component=celery-beat"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_always_on"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
