apiVersion: apps/v1
kind: Deployment

metadata:
  name: devths-ai-beat

spec:
  replicas: 1

  template:
    metadata:
      labels:
        environment: dev

    spec:
      containers:
        - name: devths-ai-beat

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
