# 네임스페이스, 이미지 등에 대한 내용은 overlays 에서 추가될 예정

apiVersion: apps/v1
kind: Deployment

# 기본 정보
metadata:
  name: devths-ai

# 스펙
spec:
  replicas: 4
  revisionHistoryLimit: 3

  # 배포 전략: Zero-downtime Rolling Update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 한 번에 1개 Pod 추가
      maxUnavailable: 0  # 가용 Pod 수 유지

  # 셀렉터
  selector:
    matchLabels:
      app: ai

  # 라벨
  template:
    metadata:
      labels:
        app: ai

    # 컨테이너 스펙
    spec:
      containers:
        - name: devths-ai

          # 수정될 이미지
          image: REPLACE_ME
          ports:
            - containerPort: 8000

          # 파라미터 스토어에서 주입받는 내용
          envFrom:
            - secretRef:
                name: ai-secret-kv

          # ML 모델 로딩을 고려한 Probe 설정
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
