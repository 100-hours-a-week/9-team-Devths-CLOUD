server {
    listen 80;
    listen 443 ssl;
    server_name devths.com www.devths.com;

    # SSL 설정
    ssl_certificate /etc/letsencrypt/live/devths.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devths.com/privkey.pem;

    root /var/www/html; # 점검 페이지 HTML이 위치한 경로
    error_page 503 /migration.html;

    location / {
        return 503;
    }

    location = /migration.html {
        internal;
    }
}