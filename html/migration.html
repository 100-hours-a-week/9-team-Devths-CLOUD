<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devths - Server Migration</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --dark-forest: #1e3932;
            --bg-soft: #f4f7f5;
            --text-main: #2c3e50;
            --text-sub: #5d6d7e;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .container {
            text-align: center;
            background: white;
            padding: 4.5rem 2rem;
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
            max-width: 450px;
            width: 90%;
        }

        /* 톡톡 튀는 초록색 로딩 애니메이션 */
        .loader {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }
        .loader div {
            width: 14px;
            height: 14px;
            background-color: var(--primary-green);
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .loader div:nth-child(2) { animation-delay: 0.2s; }
        .loader div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to {
                opacity: 0.3;
                transform: translateY(-12px);
                background-color: #2ecc71; /* 올라갈 때 색상 살짝 변경 */
            }
        }

        h1 {
            color: var(--dark-forest);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            letter-spacing: -0.8px;
        }

        p {
            line-height: 1.8;
            color: var(--text-sub);
            font-size: 1.05rem;
            margin: 0;
        }

        .time-box {
            background-color: #f1f8f4;
            border-radius: 16px;
            padding: 25px;
            margin: 35px 0;
            border: 1px dashed #c8e6d1;
        }

        .time-label {
            display: block;
            color: var(--primary-green);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .time-value {
            color: var(--dark-forest);
            font-size: 1rem;
            font-weight: 600;
        }

        .footer-logo {
            font-weight: 900;
            color: #e0e6e9;
            font-size: 1.3rem;
            margin-top: 30px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader">
        <div></div><div></div><div></div>
    </div>

    <h1>Devths - 서버 이전</h1>

    <p>보다 원활한 서비스를 제공하기 위해<br>
        현재 <strong>신규 서버로의 이전</strong>이 진행 중입니다.</p>

    <div class="time-box">
        <span class="time-label">Scheduled Maintenance</span>
        <div class="time-value">
            2026. 02. 05. 18:00 — 02. 06. 09:00 (KST)
        </div>
    </div>

    <p style="font-size: 0.95rem; color: #888;">점검 시간은 작업 상황에 따라<br>일부 변동될 수 있습니다.</p>

    <div class="footer-logo">DEVTHS</div>
</div>

</body>
</html>
