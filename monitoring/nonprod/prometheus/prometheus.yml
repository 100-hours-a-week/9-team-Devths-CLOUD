global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'devths-monitoring-nonprod'
    region: 'ap-northeast-2'
    environment: 'nonprod'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:

  # EC2 모니터링 서버 자체 스크래프
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          env: 'nonprod'
          service: 'prometheus'

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          env: 'nonprod'
          service: 'alertmanager'

  # =========================================================
  # K8s 외부 EC2 — 직접 스크래프
  # (K8s 내부 서비스는 in-cluster Prometheus → remote_write로 수신)
  # =========================================================

  # DB EC2 node-exporter (172.16.10.81)
  - job_name: 'db-ec2-node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.16.10.81:9100']
        labels:
          env: 'nonprod'
          service: 'node-exporter'
          instance_name: 'devths-V3-nonprod-DB'
