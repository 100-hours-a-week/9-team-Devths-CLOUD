apiVersion: 1

datasources:
  # Prometheus - EC2 장기 보관 (30d)
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "30s"
      queryTimeout: "60s"
      httpMethod: POST

  # Loki - K8s in-cluster (NodePort: 마스터 노드 172.16.10.177:30100)
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://172.16.10.177:30100
    isDefault: false
    editable: true

  # Tempo - K8s in-cluster (NodePort: 마스터 노드 172.16.10.177:32200)
  # 주의: tracesToLogsV2/tracesToMetrics/serviceMap 등 datasourceUid 참조는
  # Grafana 12.x 프로비저닝 시 DB 저장 전 검증 실패로 크래시 유발
  # → Grafana UI에서 기동 후 수동 설정: Administration > Data sources > Tempo
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://172.16.10.177:32200
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
