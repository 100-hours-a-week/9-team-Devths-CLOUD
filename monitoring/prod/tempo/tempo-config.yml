server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s
  max_block_bytes: 10000000
  complete_block_timeout: 5m

compactor:
  compaction:
    block_retention: 1h

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members:
    - localhost:7946

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    service_graphs:
      dimensions:
        - http.method
        - http.target
        - http.status_code
    span_metrics:
      dimensions:
        - http.method
        - http.target
        - http.status_code
    local_blocks:
      flush_check_period: 10s
      trace_idle_period: 30s
      max_block_duration: 30m
      max_block_bytes: 100000000
      complete_block_timeout: 30m

storage:
  trace:
    backend: s3
    wal:
      path: /var/tempo/wal
    s3:
      bucket: ${TEMPO_S3_BUCKET}
      region: ${AWS_REGION}
      endpoint: s3.${AWS_REGION}.amazonaws.com
      insecure: false
    block:
      version: vParquet4

querier:
  frontend_worker:
    frontend_address: localhost:9095

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

overrides:
  defaults:
    metrics_generator:
      processors: [ service-graphs, span-metrics, local-blocks ]
      generate_native_histograms: classic
      collection_interval: 15s
